name = "ritimail"
main = "src/index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "ritimail"
database_id = "COLE_AQUI_O_ID_DO_BANCO"   # gerado por `wrangler d1 create ritimail`

[[send_email]]
# opcional — não é necessário para receber, apenas se quiser enviar emails pelo worker

# IMPORTANTE: as rotas de recebimento (catch-all -> Worker) são configuradas
# em Cloudflare Dashboard > Email > Email Routing para CADA domínio, não aqui.
